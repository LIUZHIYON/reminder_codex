<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>叮叮提醒 - DingDing Reminder</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <h1><span class="icon">🔔</span> 叮叮提醒</h1>
      <div class="clock" id="clockDisplay"></div>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openAddModal()">+ 新增提醒</button>
      </div>
    </div>
  </header>
  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab active" data-tab="local">本地提醒</button>
    <button class="tab" data-tab="board">板子提醒</button>
  </div>

  <!-- Now Playing Banner -->
  <div class="now-playing" id="nowPlaying">
    🔊 正在播放提醒语音...
  </div>

  <!-- Main Content -->
  <main class="main">
    <div class="reminder-grid" id="reminderGrid">
      <div class="empty-state" id="emptyState">
        <div class="big-icon">🔔</div>
        <h2>还没有提醒</h2>
        <p>点击右上角的「新增提醒」来创建你的第一个提醒吧！</p>
      </div>
    </div>
  </main>
  <!-- Board Content -->
  <main class="main" id="boardContent" style="display:none;">
    <div class="board-status-bar" id="boardStatusBar">
      <span class="board-status-dot" id="boardStatusDot"></span>
      <span id="boardStatusText">检测中...</span>
      <span class="board-reminder-count" id="boardReminderCount"></span>
      <button class="presence-toggle on" id="presenceToggle" onclick="togglePresence()">👤 有人</button>
    </div>
    <div class="reminder-grid" id="boardReminderGrid">
      <div class="empty-state" id="boardEmptyState">
        <div class="big-icon">🖥️</div>
        <h2>板子提醒</h2>
        <p>板子上暂无提醒事项</p>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">✏️ 新增提醒</h2>
      <form id="reminderForm" onsubmit="saveReminder(event)">
        <input type="hidden" id="editId" value="">

        <div class="form-group">
          <label for="title">提醒内容 *</label>
          <input type="text" id="title" required placeholder="例如：喝水、吃药、开会...">
        </div>

        <div class="form-group">
          <label for="description">备注说明</label>
          <textarea id="description" placeholder="附加说明文字..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="reminderDate">日期 *</label>
            <input type="date" id="reminderDate" required>
          </div>
          <div class="form-group">
            <label for="reminderTime">时间 *</label>
            <input type="time" id="reminderTime" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="isRepeating">重复提醒</label>
            <select id="isRepeating" onchange="toggleRepeatType()">
              <option value="0">不重复</option>
              <option value="1">重复</option>
            </select>
          </div>
          <div class="form-group" id="repeatTypeGroup" style="display:none;">
            <label for="repeatType">重复频率</label>
            <select id="repeatType">
              <option value="daily">每天</option>
              <option value="weekly">每周</option>
              <option value="monthly">每月</option>
            </select>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-cancel" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-save">💾 保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/app.js"></script>
</body>
</html>
