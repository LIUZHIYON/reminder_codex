<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

.controls { margin: 10px 0; display: flex; gap: 10px; align-items: center; }
.controls button { padding: 8px 20px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; background: #3498db; color: #fff; font-weight: bold; }
.controls button:hover { opacity: 0.85; }
.controls span { color: #ccc; font-size: 13px; }

</style>
</head>
<body>

<div id="wrapper">

</div>

<script>
let scale = 1;
const svg = document.getElementById('mainSvg');
const wrapper = document.getElementById('wrapper');
const zoomLabel = document.getElementById('zoomLevel');

function zoomIn() { scale = Math.min(scale + 0.25, 3); applyZoom(); }
function zoomOut() { scale = Math.max(scale - 0.25, 0.25); applyZoom(); }
function resetZoom() { scale = 1; applyZoom(); }
function applyZoom() {
  svg.style.transform = `scale(${scale})`;
  svg.style.transformOrigin = 'top left';
  zoomLabel.textContent = Math.round(scale * 100) + '%';
}
</script>
</body>
</html>
