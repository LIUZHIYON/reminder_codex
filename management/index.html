<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>叮叮提醒 - 设备管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif}
body{background:#f5f7fa;color:#333;padding:20px;max-width:800px;margin:0 auto}
h1{color:#6c5ce7;margin-bottom:16px;font-size:22px}
.card{background:#fff;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.card h3{font-size:14px;color:#888;margin-bottom:8px}
.on{color:#00b894;font-weight:bold}
.off{color:#d63031;font-weight:bold}
input,textarea{width:100%;padding:8px;margin-bottom:8px;border:1px solid #dfe6e9;border-radius:4px;font-size:13px}
textarea{min-height:60px;resize:vertical}
button{padding:8px 16px;background:#6c5ce7;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px}
button:hover{background:#5f3dc4}
button:disabled{background:#b2bec3}
.item{padding:8px;border-bottom:1px solid #f0f0f0;font-size:13px}
.item:last-child{border-bottom:none}
.ttl{font-weight:600}
.meta{color:#888;font-size:12px;margin-top:2px}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;background:#55efc4;color:#00b894;margin-top:4px}
.ok{color:#00b894}
.err{color:#d63031}
.info{font-size:13px;margin-bottom:4px}
.code{font-family:monospace;background:#f0f0f0;padding:2px 6px;border-radius:4px;font-size:12px}
</style>
</head>
<body>
<h1>🔔 设备管理</h1>

<!-- Login/Bind Card -->
<div class="card" id="loginCard">
  <h3>🔐 绑定宠物账号</h3>
  <input type="text" id="loginPhone" placeholder="手机号" value="13900139000">
  <input type="password" id="loginPwd" placeholder="密码" value="888888">
  <div style="display:flex;gap:8px">
    <button id="loginBtn" onclick="doLogin()">🔐 登录绑定</button>
    <span id="loginStatus" style="font-size:13px;line-height:34px;color:#00b894"></span>
  </div>
    <div style="margin-top:8px;display:flex;gap:8px">
    <input type="text" id="bindSerial" placeholder="设备序列号" style="flex:1;margin:0" value="6976f96f-bc80-56e3-9b27-13d12cdde9d3">
    <button onclick="doBind()" style="white-space:nowrap">🔗 绑定</button>
    <button onclick="doUnbind()" style="white-space:nowrap;background:#d63031">🔓 解绑</button>
  </div>
  <div style="margin-top:8px;font-size:12px;color:#888">
    <span>绑定状态: </span><span id="bindStatus" style="font-weight:600">未绑定</span>
  </div>
  <div style="margin-top:8px;font-size:12px;color:#888">
    <span>当前绑定: </span><span id="boundPhone" style="font-weight:600">未登录</span>
    <span id="boundPet" style="margin-left:10px"></span>
  </div>
</div>
<div class="card">
<h3>📋 设备信息</h3>
<div class="info">序列号: <span class="code" id="serialDisplay"></span></div>
<div class="info">状态: <span id="statusText" class="off">检测中...</span> <button onclick="reLogin()" style="padding:2px 8px;font-size:11px;background:#6c5ce7;color:white;border:none;border-radius:3px;cursor:pointer">重新登录</button></div>
<div class="info">已收提醒: <span id="reminderCount">0</span> 条</div>
<div class="info">板子状态: <span id="boardStatusText" class="off">检测中...</span></div>
</div>
<div class="card">
<h3>✉️ 发送提醒到设备</h3>
<input type="text" id="titleInput" placeholder="提醒标题（必填）">
<textarea id="contentInput" placeholder="提醒内容（可选）"></textarea>
<select id="repeatTypeSelect" style="width:100%;padding:8px;margin-bottom:8px;border:1px solid #dfe6e9;border-radius:4px;font-size:13px">
  <option value="none">不重复</option>
  <option value="daily">每天</option>
  <option value="weekly">每周</option>
  <option value="monthly">每月</option>
</select>
<input type="datetime-local" id="timeInput">
<button id="sendBtn" onclick="doSend()">发送提醒</button>
<div id="result" style="margin-top:8px;font-size:13px"></div>
</div>
<div class="card">
<h3>📜 设备收到的提醒</h3>
<div id="list"><p style="text-align:center;padding:20px;color:#888;font-size:13px">加载中...</p></div>
</div>

<div class="card">
  <h3>Remote Reminders</h3>
  <button onclick="loadRemoteReminders()" style="margin-bottom:10px">Refresh</button>
  <div id="remoteList"><p style="text-align:center;padding:20px;color:#888;font-size:13px">Click Refresh to load</p></div>
</div>

<script>

async function cancelRemoteReminder(id, title, rtime, curStatus) {
  if (!id) return;
  id = decodeURIComponent(id); title = decodeURIComponent(title); rtime = decodeURIComponent(rtime); curStatus = decodeURIComponent(curStatus);
  var newStatus = (curStatus === "cancelled") ? "sent" : "cancelled";
  try {
    var r = await fetch("/api/cancel-remote-reminder", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({reminder_id: id, title: title, reminder_time: rtime, new_status: newStatus})});
    var d = await r.json();
    loadRemoteReminders();
    if (!d.success) { console.log("操作失败:", d.msg || d.detail); }
  } catch(e) { console.log("操作失败:", e.message); }
}
async function deleteRemoteReminderRecord(id, title, rtime) {
  if (!id) return;
  id = decodeURIComponent(id); title = decodeURIComponent(title); rtime = decodeURIComponent(rtime);
  try {
    var r = await fetch("/api/delete-remote-reminder-record", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({reminder_id: id, title: title, reminder_time: rtime})});
    var d = await r.json();
    loadRemoteReminders();
    if (!d.success) { console.log("删除失败:", d.msg || d.detail); }
  } catch(e) { console.log("删除失败:", e.message); }
}

async function loadRemoteReminders() {
  var lst = document.getElementById("remoteList");
  lst.innerHTML = "<p style='text-align:center;padding:20px'>Loading...</p>";
  try {
    var resp = await fetch("/api/remote-reminders");
    if (!resp.ok) { lst.innerHTML = "<p style='color:red;text-align:center;padding:20px'>Error: " + resp.status + "</p>"; return; }
    var data = await resp.json();
    var rows = Array.isArray(data.rows) ? data.rows : [];
    rows = rows.filter(function(r) { return !String(r.id || "").startsWith("rmd_"); });
    if (!rows.length) { lst.innerHTML = "<p style='text-align:center;padding:20px;color:#888'>No reminders</p>"; return; }
    var sm = {pending:"pending",sent:"sent",executing:"executing",completed:"completed",failed:"failed",cancelled:"cancelled"};
    var h = "<div style='overflow-x:auto'><table style='width:100%;border-collapse:collapse;font-size:12px'>";
    h += "<tr style='background:#f0f0f0'>";
    h += "<th style='padding:6px;border:1px solid #ddd;text-align:left'>ID</th>";
    h += "<th style='padding:6px;border:1px solid #ddd;text-align:left'>Title</th>";
    h += "<th style='padding:6px;border:1px solid #ddd;text-align:left'>Content</th>";
    h += "<th style='padding:6px;border:1px solid #ddd;text-align:left'>Time</th>";
    h += "<th style='padding:6px;border:1px solid #ddd;text-align:left'>Status</th>";
    h += "<th style='padding:6px;border:1px solid #ddd;text-align:left'>Repeat</th>";
    h += "<th style='padding:6px;border:1px solid #ddd;text-align:left'>Sent</th>";
    h += "<th style='padding:6px;border:1px solid #ddd;text-align:left'>Result</th>";
    h += "<th style='padding:6px;border:1px solid #ddd;text-align:left'>Actions</th></tr>";
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      h += "<tr>";
      h += "<td style='padding:4px;border:1px solid #ddd'>" + (r.id || "") + "</td>";
      h += "<td style='padding:4px;border:1px solid #ddd'>" + (r.title || "") + "</td>";
      h += "<td style='padding:4px;border:1px solid #ddd'>" + (r.content || "") + "</td>";
      h += "<td style='padding:4px;border:1px solid #ddd'>" + (r.reminderTime || "") + "</td>";
      h += "<td style='padding:4px;border:1px solid #ddd'>" + (sm[r.status] || r.status || "") + "</td>";
      h += "<td style='padding:4px;border:1px solid #ddd'>" + (r.repeatType || "-") + "</td>";
      h += "<td style='padding:4px;border:1px solid #ddd'>" + (r.sentTime || "-") + "</td>";
      h += "<td style='padding:4px;border:1px solid #ddd'>" + (r.result ? JSON.stringify(r.result).substring(0, 30) : (r.errorMessage || "-")) + "</td>";
      h += "<td style='padding:4px;border:1px solid #ddd' nowrap>";
      h += "<button class='remote-cancel' data-id='" + encodeURIComponent(String(r.id||"")) + "' data-title='" + encodeURIComponent(String(r.title||"")) + "' data-time='" + encodeURIComponent(String(r.reminderTime||"")) + "' data-status='" + encodeURIComponent(String(r.status||"")) + "' style='padding:2px 6px;font-size:11px;background:#d63031;color:white;margin-right:4px'>" + (r.status==="cancelled"?"恢复":"取消") + "</button>";
      h += "<button class='remote-delete' data-id='" + encodeURIComponent(String(r.id||"")) + "' data-title='" + encodeURIComponent(String(r.title||"")) + "' data-time='" + encodeURIComponent(String(r.reminderTime||"")) + "' style='padding:2px 6px;font-size:11px;background:#636e72;color:white'>删除</button></td></tr>";
    }
    h += "</table></div>";
    lst.innerHTML = h;
  } catch (e) {
    lst.innerHTML = "<p style='color:red;text-align:center;padding:20px'>JS Error: " + (e.message || e) + "</p>";
  }
}
</script>
<script>
document.getElementById("serialDisplay").textContent = "6976f96f-bc80-56e3-9b27-13d12cdde9d3";
async function reLogin(){
  try{
    var r=await fetch("/api/re-login",{method:"POST"});
    var d=await r.json();
    document.getElementById("result").innerHTML="<span class=\"\" >"+(d.online?"重新登录成功":"重新登录失败")+"</span>";
    refresh();
    loadRemoteReminders();
  }catch(e){}
}

async function refresh(){
  try{
    let r=await fetch("/api/status");let d=await r.json();
    let st=document.getElementById("statusText");
    st.textContent=d.online?"在线":"离线";
    st.className=d.online?"on":"off";
  }catch(e){}
  try{
    let r=await fetch("/api/board-status");let d=await r.json();
    let bs=document.getElementById("boardStatusText");
    if(d.online){bs.textContent="在线";bs.className="on";}
    else{bs.textContent="离线";bs.className="off";}
  }catch(e){}
  try{
    let r=await fetch("/api/reminders");let data=await r.json();
    document.getElementById("reminderCount").textContent=data.length;
    let list=document.getElementById("list");
    if(data.length==0){list.innerHTML='<p style="text-align:center;padding:20px;color:#888;font-size:13px">暂无提醒</p>';return;}
    list.innerHTML=data.map(function(it){
      let t=it.reminder_time?new Date(it.reminder_time).toLocaleString("zh-CN"):"-";
      let at=it.received_at?new Date(it.received_at).toLocaleString("zh-CN"):"-";
      return '<div class="item"><div class="ttl">'+it.title+'</div><div class="meta">⏰ '+t+' | 收到时间: '+at+'</div><span class="tag">✅ 已接收</span></div>';
    }).join("");
  }catch(e){}
}
async function doSend(){
  let btn=document.getElementById("sendBtn");btn.disabled=true;btn.textContent="发送中...";
  let title=document.getElementById("titleInput").value.trim();
  let content=document.getElementById("contentInput").value.trim();
  let t=document.getElementById("timeInput").value;
  let repeat_type=document.getElementById("repeatTypeSelect").value;
  let res=document.getElementById("result");
  if(!title){res.innerHTML='<span class="err">请输入标题</span>';btn.disabled=false;btn.textContent="发送提醒";return;}
  let rt=t?t+":00":new Date().toISOString().slice(0,19);
  try{
    let r=await fetch("/api/send-reminder",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({title,content,reminder_time:rt,repeat_type:repeat_type})});
    let d=await r.json();
    if(d.success){res.innerHTML='<span class="ok">✅ 已发送！</span>';document.getElementById("titleInput").value="";setTimeout(refresh,2000);}
    else{res.innerHTML='<span class="err">❌ '+(d.detail||"失败")+'</span>';}
  }catch(e){res.innerHTML='<span class="err">❌ 请求失败</span>';}
  btn.disabled=false;btn.textContent="发送提醒";
}
async function doLogin(){
  var btn=document.getElementById("loginBtn");btn.disabled=true;btn.textContent="登录中...";
  var phone=document.getElementById("loginPhone").value.trim();
  var pwd=document.getElementById("loginPwd").value.trim();
  if(!phone||!pwd){document.getElementById("loginStatus").textContent="请输入手机号和密码";btn.disabled=false;btn.textContent="🔐 登录绑定";return;}
  try{
    var r=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({phone:phone,password:pwd})});
    var d=await r.json();
    if(d.success){
      document.getElementById("loginStatus").textContent="✅ 登录成功";
      document.getElementById("boundPhone").textContent=phone;
      document.getElementById("boundPet").textContent="宠物ID: "+d.pet_id;
      document.getElementById("loginPhone").value=phone;
      refresh();loadRemoteReminders();
    }else{
      document.getElementById("loginStatus").textContent="❌ "+d.msg;
    }
  }catch(e){document.getElementById("loginStatus").textContent="❌ 请求失败";}
  btn.disabled=false;btn.textContent="🔐 登录绑定";
}

// Check login status on load
async function doBind(){
  var serial=document.getElementById("bindSerial").value.trim();
  if(!serial){document.getElementById("bindStatus").textContent="请输入序列号";return;}
  try{
    var r=await fetch("/api/bind",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({serial:serial})});
    var d=await r.json();
    document.getElementById("bindStatus").textContent=d.success?"✅ 绑定成功":"❌ "+d.msg;
  }catch(e){document.getElementById("bindStatus").textContent="❌ 请求失败";}
}
async function doUnbind(){
  var serial=document.getElementById("bindSerial").value.trim();
  if(!serial){document.getElementById("bindStatus").textContent="请输入序列号";return;}
  if(!confirm("确定要解绑该设备吗？")) return;
  try{
    var r=await fetch("/api/unbind",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({serial:serial})});
    var d=await r.json();
    document.getElementById("bindStatus").textContent=d.success?"✅ 解绑成功":"❌ "+d.msg;
  }catch(e){document.getElementById("bindStatus").textContent="❌ 请求失败";}
}
async function checkLogin(){
  try{
    var r=await fetch("/api/login-status");
    var d=await r.json();
    if(d.online&&d.phone){
      document.getElementById("boundPhone").textContent=d.phone;
      if(d.pet_id) document.getElementById("boundPet").textContent="宠物ID: "+d.pet_id;
    }
  }catch(e){}
}
checkLogin();
refresh();setInterval(refresh,3000);
// Event delegation for remote reminders buttons
document.addEventListener("click", function(e) {
  var el = e.target;
  if (el.classList.contains("remote-cancel")) {
    var id = el.getAttribute("data-id");
    var title = el.getAttribute("data-title");
    var time = el.getAttribute("data-time");
    var status = el.getAttribute("data-status");
    if (id) cancelRemoteReminder(id, title, time, status);
  }
  if (el.classList.contains("remote-delete")) {
    var id = el.getAttribute("data-id");
    var title = el.getAttribute("data-title");
    var time = el.getAttribute("data-time");
    if (id) deleteRemoteReminderRecord(id, title, time);
  }
});
</script>
</body>
</html>
